<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Veronica Becerra Estrada">
    <meta name="description" content="Applying lazyloading to images">
    <link rel="stylesheet" href="styles/lazyload.css">
    <script src="scripts/lazyload.js" defer></script>
    <title>Lazyloading</title>
</head>

<body>

    <main>
        <h1>Lazy loading</h1>
        <img src="/images/flag-of-mexico.png" alt="The flag of Mexico" width="400" height="auto" loading="lazy">
        <img src="/images/rome-temple.webp" alt="The Temple of Rome, Italy" width="400" height="auto" loading="lazy">
        <img src="/images/profile.jpg" alt="A photho of me, Veronica Becerra" width="400" height="auto" loading="lazy">
        <img src="/images/palma-de-mallorca-mobile.webp" alt="A photo of palma de Mallora vertically " width="400"
            height="auto" loading="lazy">
        <img src="/images/palma-de-mallorca-large.webp" alt="A photo of palma de Mallora horizontally" width="400"
            height="auto" loading="lazy">
        <img src="/images/flag-of-mexico.png" alt="The flag of Mexico" width="400" height="auto" loading="lazy">

        <footer>
            <p>&copy; <span id="year"></span> | Veronica Becerra Estrada | Palma de Mallorca , Spain</p>
            <p><span id="lastModified"></span></p>
        </footer>
    </main>
</body>

</html>
