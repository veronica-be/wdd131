<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/x-icon" href="images/logo-trazo-black.svg">

        content="Thank you for contacting Avoranti. Your message has been successfully submitted. Our team will get back to you shortly.">

    <link rel="preload" as="image" href="images/background-form-mobile.avif" media="(max-width: 836px)"
        fetchpriority="high">
    <link rel="preload" as="image" href="images/background-form-desk.avif" media="(min-width: 837px)"

    <link rel="stylesheet" href="styles/header-footer.css">

<body>

    <!--home redirection-->
    <main>
        <div class="form-box-bg">
            <picture>

                <img class="form-bg" src="images/background-form-mobile.avif" alt="image of background of cocoa powder"
                    fetchpriority="high">

            <p>Messages posted: <span id="reviewCounter">0</span></p>
            <p>Summary of your submission:</p>
            <div id="summary-container"></div><!--applied js-->
