<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Veronica Becerra Estrada">
    <meta name="description" content="A product review form, user-friendly on mobile and computer.">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <title>Product Review Form</title>
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form id="productReview" method="get" action="review.html">

            <fieldset>
                <label for="productName" class="strong">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Choose a Product ...</option>
                </select>
            </fieldset>

            <fieldset class="rating-fieldset">
                <legend>Overall Rating</legend>

                <div class="rating-option">
                    <input type="radio" id="rating1" name="rating" value="1" required>
                    <label for="rating1">&star;</label>

                </div>

                <div class="rating-option">
                    <input type="radio" id="rating2" name="rating" value="2" required>
                    <label for="rating2">&star;&star;</label>

                </div>

                <div class="rating-option">
                    <input type="radio" id="rating3" name="rating" value="3" required>
                    <label for="rating3">&star;&star;&star;</label>

                </div>

                <div class="rating-option">
                    <input type="radio" id="rating4" name="rating" value="4" required>
                    <label for="rating4">&star;&star;&star;&star;</label>
                </div>

                <div class="rating-option">
                    <input type="radio" id="rating5" name="rating" value="5" required>
                    <label for="rating5">&star;&star;&star;&star;&star;</label>
                </div>
            </fieldset>

            <fieldset>
                <label for="installationDate" class="strong">Date of Installation</label>
                <input type="date" id="installationDate" name="installationDate" required>
            </fieldset>

            <fieldset>
                <legend>Which features did you find useful in the product? <br>
                    <span class="instruction">(Check all that apply)</span>
                </legend>

                <label><input type="checkbox" id="durability" name="features" value="Durability">
                    Durability</label>
                <label><input type="checkbox" id="easeOfUse" name="features" value="Ease of Use"> Ease of
                    Use</label>
                <label><input type="checkbox" id="performance" name="features" value="Performance">
                    Performance</label>
                <label><input type="checkbox" id="design" name="features" value="Design"> Design</label>
            </fieldset>

            <fieldset>
                <label for="review" class="strong">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="review" name="review" rows="4" autocomplete="off"></textarea>
            </fieldset>

            <fieldset>
                <label for="userName" class="strong">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="userName" name="userName">
            </fieldset>
        </form>
        <input form="productReview" type="submit" value="Submit Post Review" class="submit-button">
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> &#10070; Veronica Becerra Estrada &#10070; Mexico.</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
